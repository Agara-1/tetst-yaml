name: Weather Report

on:
  schedule:
    - cron: "0 9 * * *"  
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        city: ["London", "Prague", "Berlin", "Tokyo"]

    steps:
      - name: Fetch weather
        run: |
      
          CITY="${{ matrix.city }}"
          

          WEATHER=$(curl -s "wttr.in/${CITY}?format=3")     
          echo "Weather in $CITY: $WEATHER"

 
          echo "## $CITY Weather Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> $WEATHER" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          